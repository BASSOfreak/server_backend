services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx
    ports: 
      - 80:80    
  backend:
    build: 
      context: ./fastapi_backend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:81:81"
    volumes:
      - user_db:/etc/data

volumes:
  user_db:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/basso/Python/server_backend/user_db # must be the absolute host path and already exist
